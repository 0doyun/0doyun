name: Render Combined Card

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Checkout card generator
        uses: actions/checkout@v4
        with:
          repository: 0doyun/github-profile-summary-cards
          ref: main
          path: generator

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: generator/package-lock.json

      - name: Install & build generator
        working-directory: generator
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Render combined SVG
        working-directory: generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node render-demo.js 0doyun github_dark 9

      - name: Copy SVG into profile repo
        run: |
          mkdir -p assets
          cp generator/demo-out.svg assets/combined-card.svg

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/combined-card.svg
          if git diff --cached --quiet -- assets/combined-card.svg; then
            echo "No changes."
          else
            git commit -m "chore: refresh combined card"
            git push
          fi
